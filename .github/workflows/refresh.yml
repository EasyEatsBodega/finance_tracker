name: Refresh digest

on:
  schedule:
    # Every 15 minutes, 13:00-22:00 UTC (~9am-6pm ET, covers pre- through after-hours), Mon-Fri.
    # GitHub cron is best-effort — actual runs can be delayed 5-15 min under load.
    - cron: "*/15 13-22 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Hit /api/refresh
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL and CRON_SECRET repository secrets must be set." >&2
            exit 1
          fi
          curl --fail-with-body \
            --retry 2 --retry-delay 5 --retry-all-errors \
            --max-time 90 \
            -X POST "$APP_URL/api/refresh" \
            -H "Authorization: Bearer $CRON_SECRET"
